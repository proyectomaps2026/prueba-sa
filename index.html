<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacienda Municipal - Autenticación</title>
    <!-- Usamos Bootstrap para que se vea bien rápido -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #004a99; color: white; padding: 15px; }
        .login-container { margin-top: 80px; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #004a99; border: none; padding: 10px; width: 100%; }
        .btn-primary:hover { background-color: #003366; }
        .logo-placeholder { background: #eee; height: 150px; display: flex; align-items: center; justify-content: center; border-radius: 5px; margin-bottom: 20px; font-weight: bold; color: #666; }
    </style>
</head>
<body>

    <!-- Encabezado (Header) -->
    <nav class="navbar">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-white">🏛️ Gestión de Tributos Municipales</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 login-container">
                <div class="row align-items-center">
                    
                    <!-- Lado Izquierdo: Logo -->
                    <div class="col-md-5 text-center border-end">
                        <div class="logo-placeholder">
                            [LOGO ALCALDÍA]
                        </div>
                        <h5 class="text-muted">Hacienda Municipal</h5>
                    </div>

                    <!-- Lado Derecho: Formulario -->
                    <div class="col-md-7 ps-md-5">
                        <h4 class="mb-4">AUTENTICACIÓN DE CONTRIBUYENTE</h4>
                        
                        <form action="#">
                            <div class="mb-3">
                                <label class="form-label small">Tipo de Contribuyente</label>
                                <div>
                                    <input type="radio" name="tipo" checked> Natural 
                                    <input type="radio" name="tipo" class="ms-2"> Jurídico (RIF)
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="usuario" class="form-label small">Cédula o RIF</label>
                                <input type="text" class="form-control" id="usuario" placeholder="V-00000000">
                            </div>

                            <div class="mb-3">
                                <label for="pass" class="form-label small">Contraseña</label>
                                <input type="password" class="form-control" id="pass" placeholder="••••••••">
                            </div>

                            <div class="d-flex justify-content-between mb-4">
                                <a href="#" class="small text-decoration-none">¿Olvidó su clave?</a>
                                <a href="#" class="small text-decoration-none text-success">Registrar cuenta</a>
                            </div>

                            <button type="button" class="btn btn-primary">Ingresar al Portal</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Pie de página académico -->
    <footer class="text-center mt-5 text-muted small">
        <p>© 2024 Proyecto Académico Universitario - Simulación de Sistema de Hacienda</p>
    </footer>

</body>
</html>
