<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hacienda Municipal - Gestión de Tributos</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #fff; }
        
        /* Barra superior azul idéntica */
        .header-blue {
            background-color: #004a99;
            color: white;
            padding: 15px 50px;
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 100px;
            gap: 40px;
        }

        /* Recuadro del Logo Izquierdo */
        .logo-box {
            border: 1px solid #ccc;
            padding: 40px;
            width: 200px;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        .logo-text { font-size: 40px; font-weight: bold; color: #004a99; margin: 0; }
        .logo-subtext { color: #555; font-size: 14px; margin-top: 5px; }

        /* Formulario Derecho */
        .login-form { width: 450px; color: #333; }
        .login-form h2 { font-size: 18px; color: #333; margin-bottom: 25px; font-weight: bold; }

        .radio-group { margin-bottom: 20px; font-size: 13px; color: #666; }
        .radio-item { margin-bottom: 10px; display: flex; align-items: center; }
        .radio-item input { margin-right: 10px; }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: #555; }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .form-links {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
        }
        .form-links a { color: #004a99; text-decoration: none; font-weight: bold; }

        /* Botón Ingresar */
        .btn-ingresar {
            background-color: #004a99;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-blue">
        <span>🏛️ Gestión de tributos municipales</span>
    </div>

    <div class="container">
        <!-- Parte del Logo -->
        <div class="logo-box">
            <p class="logo-text">HACIENDA</p>
            <p class="logo-subtext">ALCALDÍA MUNICIPAL</p>
            <div style="width: 100%; height: 4px; background: linear-gradient(to right, yellow, blue, red); margin-top: 15px;"></div>
        </div>

        <!-- Parte del Formulario -->
        <div class="login-form">
            <h2>AUTENTICACIÓN DE CONTRIBUYENTE</h2>
            
            <div class="radio-group">
                <div class="radio-item"><input type="radio" name="t" checked> Persona Natural</div>
                <div class="radio-item"><input type="radio" name="t"> Persona Jurídica (RIF)</div>
                <div class="radio-item"><input type="radio" name="t"> Contribuyente Especial</div>
            </div>

            <div class="input-group">
                <label>RIF / Cédula de identidad</label>
                <input type="text" placeholder="Ej: V-12345678">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Contraseña">
            </div>

            <div class="form-links">
                <a href="#">¿Olvidó su contraseña?</a>
                <a href="#">¿Sin usuario? Registrar cuenta</a>
            </div>

            <button class="btn-ingresar">Ingresar al Portal</button>
        </div>
    </div>

</body>
</html>
